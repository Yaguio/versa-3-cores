<title>Versa 3 Cores</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --asphalt: #1a1530;
    --asphalt-2: #120e24;
    --console: #241b3d;
    --console-2: #2f2350;
    --line: #453764;
    --ink: #f6ece3;
    --ink-dim: #c9a8c4;
    --ink-faint: #8b7196;
    --gold: #f5b83a;
    --gold-dim: #c98a3a;
    --patch-red: #c1503f;
    --patch-teal: #3f9188;
    --car-brown: #6b4632;
    --good: #5fb87d;
    --bad: #d1594a;
    --sunset-pink: #e8639c;
    --sunset-cyan: #5ec8e8;
    --shadow: 0 30px 60px -20px rgba(15,5,30,0.65);
  }
  :root[data-theme="light"] {
    --asphalt: #f7e9dc;
    --asphalt-2: #f0d8c2;
    --console: #fffaf4;
    --console-2: #fbeee0;
    --line: #e8cbb0;
    --ink: #3a2440;
    --ink-dim: #7a5a72;
    --ink-faint: #ab8aa0;
    --gold: #b3760f;
    --gold-dim: #8a5c0c;
    --patch-red: #a8402f;
    --patch-teal: #2b746c;
    --car-brown: #7a5238;
    --good: #2f8452;
    --bad: #a8402f;
    --sunset-pink: #c94f83;
    --sunset-cyan: #2f8fb0;
    --shadow: 0 30px 60px -25px rgba(120,60,40,0.22);
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --asphalt: #f7e9dc;
      --asphalt-2: #f0d8c2;
      --console: #fffaf4;
      --console-2: #fbeee0;
      --line: #e8cbb0;
      --ink: #3a2440;
      --ink-dim: #7a5a72;
      --ink-faint: #ab8aa0;
      --gold: #b3760f;
      --gold-dim: #8a5c0c;
      --patch-red: #a8402f;
      --patch-teal: #2b746c;
      --car-brown: #7a5238;
      --good: #2f8452;
      --bad: #a8402f;
      --sunset-pink: #c94f83;
      --sunset-cyan: #2f8fb0;
      --shadow: 0 30px 60px -25px rgba(120,60,40,0.22);
    }
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--asphalt);
  }
  body {
    font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: clamp(16px, 4vw, 48px) 16px;
    background:
      radial-gradient(ellipse 700px 400px at 15% -10%, rgba(232,99,156,0.20), transparent 60%),
      radial-gradient(ellipse 900px 600px at 110% 110%, rgba(245,184,58,0.14), transparent 60%),
      var(--asphalt);
  }

  .mono { font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace; }

  .device {
    width: 100%;
    max-width: 460px;
    background: var(--console);
    border: 1px solid var(--line);
    border-radius: 22px;
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ---- hero cover (intro) ---- */
  .hero-cover {
    position: relative;
    width: 100%;
    aspect-ratio: 700 / 937;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hero-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: #fff;
  }
  .hero-scrim {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 30%;
    background: linear-gradient(to top, var(--console) 0%, transparent 100%);
  }

  /* ---- header / stat bar ---- */
  .statbar {
    background: var(--console-2);
    border-bottom: 1px solid var(--line);
    padding: 14px 18px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .statbar-top { display: flex; align-items: baseline; justify-content: space-between; }
  .statbar-top-right { display: flex; align-items: baseline; gap: 10px; }
  .brand {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
    font-weight: 700;
    letter-spacing: 0.06em;
    font-size: 13px;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .brand b { color: var(--gold); }
  .clock {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
    font-size: 13px;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
  }
  .stats-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    align-items: center;
  }
  .money {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
    font-size: 19px;
    font-weight: 700;
    color: var(--gold);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .money.neg { color: var(--bad); }
  .mid-wrap { display: flex; flex-direction: column; gap: 6px; }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
  }
  .meter {
    height: 7px;
    border-radius: 4px;
    background: var(--asphalt-2);
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .meter > span { display: block; height: 100%; border-radius: 4px; transition: width 500ms ease, background-color 500ms ease; }
  .rating-line { display: flex; align-items: baseline; gap: 6px; }
  .stars { position: relative; display: inline-block; font-size: 13px; letter-spacing: 2px; line-height: 1; }
  .stars .stars-empty { color: var(--line); }
  .stars .stars-fill { position: absolute; top: 0; left: 0; overflow: hidden; white-space: nowrap; color: var(--gold); }
  .rating-num {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
    font-size: 11px;
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }

  /* ---- car photo ---- */
  .car-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; }
  .car-photo {
    display: block;
    width: 88px;
    height: auto;
    border-radius: 8px;
    border: 1px solid var(--line);
    box-shadow: 0 2px 10px color-mix(in srgb, var(--sunset-pink) 30%, transparent);
    background: #fff;
  }

  /* ---- wishlist row ---- */
  .wishlist-row { display: flex; flex-direction: column; gap: 5px; }
  .wishlist-label {
    display: flex; justify-content: space-between; gap: 10px;
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
    font-size: 10.5px; color: var(--ink-faint);
  }
  .wishlist-label .wl-name { color: var(--ink-dim); }
  .wishlist-label .wl-amt { white-space: nowrap; font-variant-numeric: tabular-nums; }
  .wishlist-dots { display: flex; gap: 4px; }
  .wishlist-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--line); flex-shrink: 0; }
  .wishlist-dots span.done { background: var(--gold); }

  /* ---- 30-day tracker ---- */
  .day-track-wrap { display: flex; flex-direction: column; gap: 6px; }
  .day-track { display: flex; flex-wrap: wrap; gap: 4px; }
  .day-track span {
    width: 9px; height: 9px; border-radius: 3px;
    background: var(--line);
    flex-shrink: 0;
  }
  .day-track span.past { background: var(--ink-faint); }
  .day-track span.current {
    background: var(--gold);
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--gold) 35%, transparent);
  }

  /* ---- scene area ---- */
  .scene { padding: 22px 20px 18px; flex: 1; min-height: 210px; display: flex; flex-direction: column; gap: 14px; }
  .ticket {
    background: var(--asphalt-2);
    border: 1px dashed var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
    font-size: 13px;
    line-height: 1.7;
    color: var(--ink-dim);
  }
  .ticket .row { display: flex; justify-content: space-between; gap: 10px; }
  .ticket .val { color: var(--ink); }
  .ticket .fare { color: var(--gold); font-weight: 700; }
  .ticket .good { color: var(--good); font-weight: 700; }
  .ticket .bad { color: var(--bad); font-weight: 700; }
  .ticket hr { border: none; border-top: 1px dashed var(--line); margin: 2px 0; }

  .eyebrow {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  h1.title {
    font-size: 28px;
    line-height: 1.15;
    margin: 0;
    text-wrap: balance;
    letter-spacing: -0.01em;
    font-weight: 800;
    background: linear-gradient(180deg, var(--sunset-cyan) 0%, var(--sunset-pink) 55%, var(--gold) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    width: fit-content;
  }
  h2.scene-title { margin: 0; font-size: 19px; line-height: 1.25; text-wrap: balance; }
  p.body-text { margin: 0; font-size: 15px; line-height: 1.6; color: var(--ink-dim); max-width: 44ch; }
  p.quote {
    margin: 0; font-size: 15px; line-height: 1.6; color: var(--ink); font-style: italic;
    border-left: 3px solid var(--gold-dim); padding-left: 12px;
  }
  ul.wishlist-intro { margin: 0; padding-left: 18px; font-size: 13.5px; line-height: 1.7; color: var(--ink-dim); }
  ul.wishlist-intro li span { color: var(--gold); font-variant-numeric: tabular-nums; }

  .delta-log { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
    font-size: 12px; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--line); color: var(--ink-dim);
  }
  .chip.good { color: var(--good); border-color: color-mix(in srgb, var(--good) 45%, var(--line)); }
  .chip.bad { color: var(--bad); border-color: color-mix(in srgb, var(--bad) 45%, var(--line)); }

  /* ---- actions ---- */
  .actions {
    padding: 16px 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-top: 1px solid var(--line);
    background: var(--console-2);
  }
  .btn {
    appearance: none;
    border: none;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    background: var(--console);
    color: var(--ink);
    border: 1px solid var(--line);
    transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
  }
  .btn:hover { border-color: var(--gold-dim); }
  .btn:active { transform: scale(0.98); }
  .btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .btn .sub { display: block; font-weight: 400; font-size: 12.5px; color: var(--ink-faint); margin-top: 3px; }
  .btn.primary { background: var(--gold); color: #241a05; border-color: var(--gold); }
  .btn.primary .sub { color: rgba(36,26,5,0.72); }
  .btn.primary:hover { filter: brightness(1.06); }
  .btn.ghost { background: transparent; }
  .btn.danger:hover { border-color: var(--bad); }

  input.name-input {
    font-family: inherit;
    font-size: 15px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--asphalt-2);
    color: var(--ink);
    width: 100%;
  }
  input.name-input:focus-visible { outline: 2px solid var(--gold); outline-offset: 1px; }
  label.field-label {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .summary-cell { background: var(--asphalt-2); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; }
  .summary-cell.wide { grid-column: 1 / -1; }
  .summary-cell .k {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .summary-cell .v { font-size: 16px; font-weight: 700; margin-top: 3px; font-variant-numeric: tabular-nums; }

  .badge-outcome {
    display: inline-block;
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    width: fit-content;
  }
  .badge-outcome.win { background: color-mix(in srgb, var(--good) 20%, transparent); color: var(--good); border: 1px solid color-mix(in srgb, var(--good) 45%, var(--line)); }
  .badge-outcome.lose { background: color-mix(in srgb, var(--bad) 20%, transparent); color: var(--bad); border: 1px solid color-mix(in srgb, var(--bad) 45%, var(--line)); }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px) rotate(-0.6deg); }
    40% { transform: translateX(4px) rotate(0.6deg); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(3px); }
  }
  .shake { animation: shake 380ms ease; }
  @media (prefers-reduced-motion: reduce) {
    .shake { animation: none; }
    .meter > span { transition: none; }
  }

  .fade-in { animation: fadeIn 260ms ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { .fade-in { animation: none; } }

  .footnote {
    text-align: center;
    font-size: 11.5px;
    color: var(--ink-faint);
    margin-top: 14px;
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
  }
</style>

<div class="device" id="device"></div>

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;

  }

  function formatSigned(v, suffix) {
    return (v >= 0 ? "+" : "-") + Math.abs(v).toFixed(v % 1 === 0 ? 0 : 1) + (suffix || "");

  function loadRanking() {
    try {

      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function addRankingEntry(jogador, dia) {
    var list = loadRanking();
    var entry = { jogador: jogador || "Anônimo", dia: dia, quando: Date.now() };
    list.push(entry);
    list.sort(function (a, b) { return a.dia - b.dia; });
    list = list.slice(0, 10);
    try { localStorage.setItem(RANKING_KEY, JSON.stringify(list)); } catch (e) {}
    return { list: list, entry: entry };
  }

  function renderRankingHtml(list, destaque) {
    if (!list.length) {
      return '<p class="body-text">Ainda não tem ninguém no ranking. Seja o primeiro a fechar a lista.</p>';
    }
    var rows = list.map(function (r, i) {
      var isDestaque = destaque && r.quando === destaque.quando && r.jogador === destaque.jogador;
      return (
        '<div class="row"' + (isDestaque ? ' style="color:var(--gold);font-weight:700;"' : '') + '>' +
          '<span>' + (i + 1) + '. ' + escapeHtml(r.jogador) + '</span>' +
          '<span class="val">dia ' + r.dia + '</span>' +
        '</div>'
      );
    }).join("");
    return '<div class="ticket">' + rows + '</div>';
  }

  function pickWeighted(pool) {
    var total = pool.reduce(function (s, p) { return s + p.weight; }, 0);
    var roll = Math.random() * total;
    for (var i = 0; i < pool.length; i++) {
      roll -= pool[i].weight;
      if (roll <= 0) return pool[i];
    }
    return pool[pool.length - 1];
  }

      )
      : '<div class="wishlist-row"><div class="wishlist-label"><span class="wl-name">🛒 lista concluída</span></div><div class="wishlist-dots">' + dots + '</div></div>';

    var motorPct = clamp(state.motor, 0, 100);

    return (
      '<div class="statbar">' +
        '<div class="statbar-top">' +
          '<div class="brand">Versa <b>3 Cores</b></div>' +
          '<div class="statbar-top-right">' +
            (state.dividaCP > 0 ? '<span class="clock mono" style="color:var(--bad)">CP ' + formatMoney(state.dividaCP) + '</span>' : '') +
            '<span class="clock mono">dia ' + state.dia + '/' + TOTAL_DIAS + '</span>' +
            '<span class="clock mono">' + clockLabel() + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="stats-row">' +
          '<div class="money' + (state.dinheiro < 0 ? " neg" : "") + '">' + formatMoney(state.dinheiro) + '</div>' +
          '<div class="mid-wrap">' +
            '<div>' +
              '<div class="stat-label">paciência</div>' +
              '<div class="meter"><span style="width:' + pct + '%;background:' + patienceColor(pct) + '"></span></div>' +
            '</div>' +
            '<div>' +
              '<div class="stat-label">vida do versa</div>' +
              '<div class="meter"><span style="width:' + motorPct + '%;background:' + patienceColor(motorPct) + '"></span></div>' +
            '</div>' +
            '<div class="rating-line">' + renderStars(state.nota) + '<span class="rating-num">' + state.nota.toFixed(1) + '</span></div>' +
          '</div>' +
          '<div class="car-wrap">' +
            '<img class="car-photo" src="' + carImageForMotor(motorPct) + '" alt="estado do Versa" />' +
          '</div>' +
        '</div>' +
        wishlistRow +
      '</div>'
    );
  }

  function render() {
    if (state.screen === "intro") return renderIntro();
    if (state.screen === "day-intro") return renderDayIntro();
    if (state.screen === "day-end") return renderDayEnd();
    if (state.screen === "ride") return renderRide();
    if (state.screen === "declined") return renderDeclined();
    if (state.screen === "encounter") return renderEncounter();
    if (state.screen === "resolution") return renderResolution();
    if (state.screen === "compra") return renderCompra();
    if (state.screen === "maintenance") return renderMaintenance();
    if (state.screen === "maintenance-result") return renderMaintenanceResult();
    if (state.screen === "family") return renderFamily();
    if (state.screen === "family-result") return renderFamilyResult();
    if (state.screen === "fabi") return renderFabi();
    if (state.screen === "comida") return renderComida();
    if (state.screen === "comida-result") return renderComidaResult();
    if (state.screen === "gasto") return renderGasto();
    if (state.screen === "cp") return renderCP();
    if (state.screen === "cp-emergencia") return renderCPEmergencia();
    if (state.screen === "win") return renderWin();
    if (state.screen === "lose_motor") return renderLose("motor");
    if (state.screen === "lose_falencia") return renderLose("falencia");
    if (state.screen === "lose_prazo") return renderLose("prazo");
    if (state.screen === "lose_cp") return renderLose("cp");
    if (state.screen === "ranking") return renderRanking();
  }

  function renderIntro() {
    var lista = WISHLIST.map(function (g) {
      return '<li>' + escapeHtml(g.texto) + ' <span>' + formatMoney(g.meta) + '</span></li>';
    }).join("");

    device.innerHTML =
      '<div class="hero-cover">' +
        '<img src="' + COVER_IMG + '" alt="Versa 3 Cores — uma aventura no Rio" />' +
        '<div class="hero-scrim"></div>' +
      '</div>' +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">o desafio de 30 dias de Versa 3 Cores</div>' +
        '<p class="body-text">O Versa é marrom. Depois de tantas batidas que o dono jura que “não foi culpa minha”, pode ganhar até mais duas cores diferentes de porta e capô. Hernalton Junior mora na Baixada mas roda o Rio inteiro, não gosta de trabalhar, só aceita corrida boa, é mão de vaca até com o próprio ar condicionado, e reclama de todo passageiro do dia.</p>' +
        '<p class="body-text">E passageiro nem é o pior: o primo Nublinho sempre tem uma ideia de negócio, o pequeno Voah apronta das suas, seu Berruga cobra favor pra escola de samba Acadêmicos do Vinho, e o primo Fabi Jujuba ri de cada decisão errada.</p>' +
        '<p class="body-text"><b>Você tem 30 dias</b> pra ele comprar tudo da lista abaixo com o lucro das corridas. Trabalhar demais cansa e encurta o dia seguinte; ficar em casa — paixão secreta dele — recupera o fôlego. <b>Perde</b> quem fundir o motor, falir de vez, ou chegar ao dia 31 sem fechar a lista.</p>' +
        '<ul class="wishlist-intro">' + lista + '</ul>' +
        '<label class="field-label" for="jogador-input">seu nome (aparece no ranking)</label>' +
        '<input class="name-input mono" id="jogador-input" maxlength="24" value="' + escapeHtml(state.jogador) + '" />' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn primary" id="btn-start">Começar o desafio<span class="sub">30 dias, um Versa marrom, uma lista enorme</span></button>' +
        '<button class="btn ghost" id="btn-ver-ranking">Ver ranking</button>' +
      '</div>';

    document.getElementById("btn-start").addEventListener("click", function () {
      var input = document.getElementById("jogador-input");
      state.jogador = (input.value || state.jogador).trim() || "Anônimo";
      goToDayIntro();
    });
    document.getElementById("btn-ver-ranking").addEventListener("click", function () {
      state.screen = "ranking";
      render();
    });
  }

  function renderRanking() {
    var list = loadRanking();
    device.innerHTML =
      '<div class="scene fade-in">' +
        '<div class="eyebrow">ranking · quem chegou mais rápido</div>' +
        '<h2 class="scene-title">🏆 Melhores tempos</h2>' +
        renderRankingHtml(list) +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn primary" id="btn-voltar-intro">Voltar</button>' +
      '</div>';
    document.getElementById("btn-voltar-intro").addEventListener("click", function () {
      state.screen = "intro";
      render();
    });
  }

  // ---------------------------------------------------------------
  // day loop
  // ---------------------------------------------------------------

  function goToDayIntro() {
    if (state.dividaCP > 0 && state.dia % 7 === 1 && state.dia > 1) {
      state.dividaCP = Math.round(state.dividaCP * (1 + CP_JUROS_SEMANAL) * 100) / 100;
      if (state.dividaCP >= CP_LIMITE_PERIGO) { state.screen = "lose_cp"; render(); return; }
    }
    state.paciencia = clamp(state.paciencia + 3, 0, 100); // uma noite de sono ajuda um pouco, trabalhando ou não
    state.minutosDisponiveisHoje = minutosBudgetHoje(state.cansaco);
    state.minutos = 400;
    state.tentativasHoje = 0;
    state.comeuHoje = false;
    state.dinheiroInicioDia = state.dinheiro;
    state.screen = "day-intro";
    render();
  }

  function renderDayIntro() {
    var horas = (state.minutosDisponiveisHoje / 60).toFixed(1);
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">dia ' + state.dia + ' de ' + TOTAL_DIAS + '</div>' +
        '<h2 class="scene-title">' + cansacoLabel(state.cansaco) + '</h2>' +
        renderDayTrack() +
        '<p class="body-text">Hoje ele aguenta até <b>' + horas + 'h</b> de trabalho antes de precisar parar.</p>' +
        '<p class="body-text">Trabalhar demais cansa e encurta o dia de amanhã. Ficar em casa recupera tudo — só que também não rende nada.</p>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn primary" id="btn-work">Trabalhar hoje<span class="sub">' + horas + 'h disponíveis, cansaço acumula</span></button>' +
        '<button class="btn ghost" id="btn-rest">Ficar em casa jogando CS<span class="sub">zero corrida, mas recupera o fôlego todo</span></button>' +
        '<button class="btn ghost" id="btn-cp">Falar com CP<span class="sub">' + (state.dividaCP > 0 ? "dívida atual: " + formatMoney(state.dividaCP) : "empréstimo rápido, juros pesados") + '</span></button>' +
      '</div>';
    document.getElementById("btn-work").addEventListener("click", startWorkDay);
    document.getElementById("btn-rest").addEventListener("click", restDay);
    document.getElementById("btn-cp").addEventListener("click", function () {
      state.screen = "cp";
      render();
    });
  }

  function renderCP() {
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">CP resolve rápido</div>' +
        '<h2 class="scene-title">💰 O agiota atende</h2>' +
        '<p class="body-text">CP é bombeiro de dia, agiota o resto do tempo, e anda sempre armado — melhor não atrasar. Juros de ' + Math.round(CP_JUROS_SEMANAL * 100) + '% por semana em cima do que ainda deve.</p>' +
        (state.dividaCP > 0 ? '<p class="quote">Dívida atual: ' + formatMoney(state.dividaCP) + '</p>' : '<p class="body-text">Nenhuma dívida no momento.</p>') +
      '</div>' +
      '<div class="actions">' +
        CP_EMPRESTIMOS.map(function (v) {
          return '<button class="btn" data-cp="' + v + '">Pegar ' + formatMoney(v) + '<span class="sub">entra na dívida, juros correm toda semana</span></button>';
        }).join("") +
        (state.dividaCP > 0 ? '<button class="btn ghost" id="btn-cp-pagar">Pagar o que der<span class="sub">quita até onde o caixa alcançar</span></button>' : '') +
        '<button class="btn ghost" id="btn-cp-voltar">Voltar</button>' +
      '</div>';

    Array.prototype.forEach.call(device.querySelectorAll("[data-cp]"), function (btn) {
      btn.addEventListener("click", function () {
        var valor = parseFloat(btn.getAttribute("data-cp"));
        state.dinheiro += valor;
        state.dividaCP += valor;
        if (state.dividaCP >= CP_LIMITE_PERIGO) { state.screen = "lose_cp"; render(); return; }
        state.screen = "day-intro";
        render();
      });
    });
    var pagarBtn = document.getElementById("btn-cp-pagar");
    if (pagarBtn) {
      pagarBtn.addEventListener("click", function () {
        var pago = Math.min(Math.max(state.dinheiro, 0), state.dividaCP);
        state.dinheiro -= pago;
        state.dividaCP -= pago;
        state.screen = "day-intro";
        render();
      });
    }
    document.getElementById("btn-cp-voltar").addEventListener("click", function () {
      state.screen = "day-intro";
      render();
    });
  }

  function checkFalencia(nextFn) {
    if (state.dinheiro <= FALENCIA_LIMIT) {
      state._cpEmergenciaNext = nextFn;
      state.screen = "cp-emergencia";
      render();
      return true;
    }
    return false;
  }

  function checkPaciencia() {
    if (state.paciencia <= 0) {
      state.dinheiro -= 10;
      state.paciencia = 35;
      endWorkDay("estresse");
      return true;
    }
    return false;
  }

  function renderCPEmergencia() {
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">sem saída</div>' +
        '<h2 class="scene-title">💰 CP atende rápido</h2>' +
        '<p class="body-text">O caixa foi pro fundo do poço: ' + formatMoney(state.dinheiro) + '. CP empresta na hora, mas os juros correm toda semana — e ele anda armado.</p>' +
      '</div>' +
      '<div class="actions">' +
        CP_EMPRESTIMOS.map(function (v) {
          return '<button class="btn" data-cp="' + v + '">Pegar ' + formatMoney(v) + '<span class="sub">entra na dívida, resolve agora</span></button>';
        }).join("") +
        '<button class="btn ghost danger" id="btn-cp-falir">Aceitar a falência</button>' +
      '</div>';

    Array.prototype.forEach.call(device.querySelectorAll("[data-cp]"), function (btn) {
      btn.addEventListener("click", function () {
        var valor = parseFloat(btn.getAttribute("data-cp"));
        state.dinheiro += valor;
        state.dividaCP += valor;
        if (state.dividaCP >= CP_LIMITE_PERIGO) { state.screen = "lose_cp"; render(); return; }
        var next = state._cpEmergenciaNext;
        state._cpEmergenciaNext = null;
        next();
      });
    });
    document.getElementById("btn-cp-falir").addEventListener("click", function () {
      state.screen = "lose_falencia";
      render();
    });
  }

  function startWorkDay() {
    state.recusasSeguidas = 0;
    goToNextRide();
  }

  function restDay() {
    state.cansaco = clamp(state.cansaco - REST_CANSACO_RECUPERA, 0, 100);
    state.paciencia = clamp(state.paciencia + 25, 0, 100);
    state.lastDayFlavor = REST_FLAVORS[Math.floor(Math.random() * REST_FLAVORS.length)];
    state.lastDayTrabalhou = false;
    state.lastDayHoras = 0;
    state.screen = "day-end";
    render();
  }

  function endWorkDay(motivo) {
    var horas = (state.minutos - 400) / 60;
    state.cansaco = clamp(state.cansaco + horas * WORK_CANSACO_POR_HORA, 0, 100);
    state.lastDayTrabalhou = true;
    state.lastDayMotivo = motivo || "cansaco";
    state.lastDayHoras = horas;
    state.screen = "day-end";
    render();
  }

  function renderDayEnd() {
    var proximoBudget = minutosBudgetHoje(state.cansaco);
    var ganhoHoje = state.dinheiro - state.dinheiroInicioDia;
    var corpo;
    if (!state.lastDayTrabalhou) {
      corpo = '<p class="quote">' + escapeHtml(state.lastDayFlavor) + '</p>';
    } else if (state.lastDayMotivo === "doenca") {
      corpo = '<p class="body-text">O resto do dia foi perdido de cama — trabalhou só ' + state.lastDayHoras.toFixed(1) + 'h antes de passar mal.</p>';
    } else if (state.lastDayMotivo === "estresse") {
      corpo = '<p class="body-text">A paciência zerou de vez. Naltinho largou o volante no meio da tarde e foi direto pra casa tomar um litrão sozinho.</p>';
    } else {
      corpo = '<p class="body-text">Hernalton trabalhou cerca de ' + state.lastDayHoras.toFixed(1) + 'h hoje. O corpo cobra a conta.</p>';
    }
    var titulo2 = !state.lastDayTrabalhou ? "Dia de sofá"
      : state.lastDayMotivo === "doenca" ? "Passou mal"
      : state.lastDayMotivo === "estresse" ? "Estourou a paciência"
      : "Chega por hoje";
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">fim do dia ' + state.dia + '</div>' +
        '<h2 class="scene-title">' + titulo2 + '</h2>' +
        renderDayTrack() +
        corpo +
        '<div class="delta-log">' +
          '<span class="chip ' + (ganhoHoje >= 0 ? "good" : "bad") + '">' + (ganhoHoje >= 0 ? "+" : "") + formatMoney(ganhoHoje) + ' hoje</span>' +
          '<span class="chip">cansaço: ' + Math.round(state.cansaco) + '</span>' +
        '</div>' +
        '<p class="body-text">Amanhã, com esse cansaço, dá pra aguentar uns <b>' + (proximoBudget / 60).toFixed(1) + 'h</b>.</p>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn primary" id="btn-continue">' + (state.dia >= TOTAL_DIAS ? "Ver o resultado" : "Ir pro próximo dia") + '</button>' +
      '</div>';
    document.getElementById("btn-continue").addEventListener("click", advanceDay);
  }

  function advanceDay() {
    state.dia++;
    if (state.dia > TOTAL_DIAS) { state.screen = "lose_prazo"; render(); return; }
    goToDayIntro();
  }

  // ---------------------------------------------------------------
  // ride loop
  // ---------------------------------------------------------------

  function goToNextRide() {
    var elapsed = state.minutos - 400;
    if (elapsed >= state.minutosDisponiveisHoje) { endWorkDay("cansaco"); return; }

    if (!state.comeuHoje && elapsed >= LUNCH_THRESHOLD_MIN) {
      state.comeuHoje = true;
      state.screen = "comida";
      render();
      return;
    }

    var roll = Math.random();
    if (roll < FAMILY_CHANCE) {
      state.currentFamily = pickFamilyEvent();
      state.screen = "family";
      render();
      return;
    }
    if (roll < FAMILY_CHANCE + GASTO_CHANCE) {
      state.currentGasto = GASTOS_ALEATORIOS[Math.floor(Math.random() * GASTOS_ALEATORIOS.length)];
      state.screen = "gasto";
      render();
      return;
    }

    if (!state.deck.length) state.deck = shuffle(RIDES.slice());
    var base = state.deck.pop();
    var transito = pickWeighted(TRANSITO_OPTIONS);
    var custo = (base.km / consumoAtual()) * PRECO_GASOLINA * transito.mult;
    state.currentRide = {
      origem: base.origem, destino: base.destino, km: base.km, valor: base.valor,
      transito: transito, custo: custo, lucro: base.valor - custo
    };
    state.forced = state.recusasSeguidas >= CONSECUTIVE_DECLINE_LIMIT;
    state.screen = "ride";
    render();
  }

  function renderRide() {
    var r = state.currentRide;
    var margemFina = r.lucro >= 0 && r.lucro < 8;
    var prejuizo = r.lucro < 0;

    var flavor;
    if (state.forced) flavor = FORCED_ACCEPT_FLAVOR;
    else if (prejuizo) flavor = "Essa corrida vai dar prejuízo se ele aceitar. Hernalton sabe. Talvez aceite mesmo assim.";
    else if (margemFina) flavor = "Corrida de margem fina. O Hernalton já sabe o que vem a seguir.";
    else flavor = "Corrida decente. Talvez hoje não seja tão ruim.";

    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">dia ' + state.dia + ' · tentativa ' + (state.tentativasHoje + 1) + '</div>' +
        '<h2 class="scene-title">' + escapeHtml(r.origem) + ' → ' + escapeHtml(r.destino) + '</h2>' +
        '<div class="ticket">' +
          '<div class="row"><span>Distância</span><span class="val">' + r.km.toFixed(1) + ' km</span></div>' +
          '<div class="row"><span>Trânsito</span><span class="val">' + escapeHtml(r.transito.label) + '</span></div>' +
          '<div class="row"><span>Valor da corrida</span><span class="fare">' + formatMoney(r.valor) + '</span></div>' +
          '<div class="row"><span>Combustível estimado</span><span class="val">-' + formatMoney(r.custo) + '</span></div>' +
          '<hr />' +
          '<div class="row"><span>Lucro estimado</span><span class="' + (r.lucro >= 0 ? "good" : "bad") + '">' + formatMoney(r.lucro) + '</span></div>' +
        '</div>' +
        '<p class="body-text">' + flavor + '</p>' +
      '</div>' +
      '<div class="actions">' +
        (state.forced ? '' : '<button class="btn ghost danger" id="btn-decline">Recusar<span class="sub">deixar pra próxima, essa não compensa</span></button>') +
        '<button class="btn primary" id="btn-accept">Aceitar<span class="sub">' + (prejuizo ? "vai reclamar (com razão, dessa vez)" : "essa vale a pena") + '</span></button>' +
      '</div>';

    document.getElementById("btn-accept").addEventListener("click", function () {
      acceptRide(prejuizo, margemFina);
    });
    var declineBtn = document.getElementById("btn-decline");
    if (declineBtn) declineBtn.addEventListener("click", function () { declineRide(prejuizo); });
  }

  function acceptRide(prejuizo, margemFina) {
    state.aceitas++;
    state.tentativasHoje++;
    state.recusasSeguidas = 0;
    state.minutos += 60 + Math.floor(Math.random() * 50);
    state.dinheiro += state.currentRide.lucro;
    state.lastLucro = state.currentRide.lucro;
    state.fabiTrigger = state.fabiTrigger || prejuizo;

    if (prejuizo) state.lastComplaint = COMPLAINTS_PREJUIZO[Math.floor(Math.random() * COMPLAINTS_PREJUIZO.length)];
    else if (margemFina) state.lastComplaint = COMPLAINTS_MARGEM_FINA[Math.floor(Math.random() * COMPLAINTS_MARGEM_FINA.length)];
    else state.lastComplaint = null;

    if (prejuizo) state.paciencia = clamp(state.paciencia - 6, 0, 100);
    else if (margemFina) state.paciencia = clamp(state.paciencia - 3, 0, 100);

    if (!state.encounterDeck.length) state.encounterDeck = shuffle(ENCOUNTERS.slice());
    state.currentEncounter = state.encounterDeck.pop();
    state.screen = "encounter";
    render();
  }

  function declineRide(prejuizo) {
    state.recusadas++;
    state.tentativasHoje++;
    state.recusasSeguidas++;
    state.minutos += 20 + Math.floor(Math.random() * 20);
    var pool = prejuizo ? DECLINE_FLAVOR_PREJUIZO : DECLINE_FLAVOR_BARATA;
    state.lastDecline = pool[Math.floor(Math.random() * pool.length)];
    state.screen = "declined";
    render();
  }

  function renderDeclined() {
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">recusada</div>' +
        '<p class="quote">' + escapeHtml(state.lastDecline) + '</p>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn primary" id="btn-continue">Esperar próxima corrida</button>' +
      '</div>';
    document.getElementById("btn-continue").addEventListener("click", goToNextRide);
  }

  function renderEncounter() {
    var e = state.currentEncounter;
    var pre = state.lastComplaint ? '<p class="quote">' + escapeHtml(state.lastComplaint) + '</p>' : "";
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">passageiro embarcou</div>' +
        '<h2 class="scene-title">' + e.emoji + ' ' + escapeHtml(e.titulo) + '</h2>' +
        pre +
        '<p class="body-text">' + escapeHtml(e.texto) + '</p>' +
      '</div>' +
      '<div class="actions">' +
        e.escolhas.map(function (c, i) {
          return '<button class="btn" data-i="' + i + '">' + escapeHtml(c.rotulo) + '<span class="sub">' + escapeHtml(c.sub) + '</span></button>';
        }).join("") +
      '</div>';

    Array.prototype.forEach.call(device.querySelectorAll("[data-i]"), function (btn) {
      btn.addEventListener("click", function () {
        resolveEncounter(e.escolhas[parseInt(btn.getAttribute("data-i"), 10)]);
      });
    });
  }

  function resolveEncounter(choice) {
    state.dinheiro += choice.dinheiro;
    state.paciencia = clamp(state.paciencia + choice.paciencia, 0, 100);
    state.nota = clamp(state.nota + choice.estrelas, 1, 5);

    var batida = false;
    if (state.corPatches < 3) {
      var roll = Math.random() * 100;
      if (roll < clamp(choice.dano + state.riscoBatidaMod, 0, 100)) {
        batida = true;
        state.corPatches++;
      }
    }
    state.fabiTrigger = state.fabiTrigger || choice.estrelas < 0 || batida;

    state.lastResolution = choice.resultado;
    state.lastChips = [
      { label: formatSigned(state.lastLucro, "") + " (corrida)", cls: state.lastLucro >= 0 ? "good" : "bad" },
      { label: (choice.dinheiro >= 0 ? "+" : "") + formatMoney(choice.dinheiro) + " gorjeta/gasto", cls: choice.dinheiro >= 0 ? "good" : "bad" },
      { label: formatSigned(choice.paciencia, "") + " paciência", cls: choice.paciencia >= 0 ? "good" : "bad" },
      { label: formatSigned(choice.estrelas, "") + " nota", cls: choice.estrelas >= 0 ? "good" : "bad" }
    ];
    if (batida) state.lastChips.push({ label: "nova cor no carro", cls: "bad" });
    state.lastBatida = batida;
    state.screen = "resolution";
    render();

    if (batida) {
      var sceneEl = device.querySelector(".scene");
      if (sceneEl) sceneEl.classList.add("shake");
    }
  }

  function renderResolution() {
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">' + (state.lastBatida ? "e então, bateu de novo" : "corrida concluída") + '</div>' +
        '<p class="body-text">' + escapeHtml(state.lastResolution) + '</p>' +
        (state.lastBatida ? '<p class="body-text">Mais uma cor pro Versa. Já são ' + state.corPatches + ' agora — tá quase uma colcha de retalhos com motor.</p>' : "") +
        '<div class="delta-log">' +
          state.lastChips.map(function (c) { return '<span class="chip ' + c.cls + '">' + escapeHtml(c.label) + '</span>'; }).join("") +
        '</div>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn primary" id="btn-continue">Seguir o dia</button>' +
      '</div>';
    document.getElementById("btn-continue").addEventListener("click", function () { maybeShowFabi(afterRideComplete); });
  }

  function tryAutoBuy() {
    var compras = [];
    while (state.proximoIndex < WISHLIST.length && state.dinheiro >= WISHLIST[state.proximoIndex].meta) {
      var item = WISHLIST[state.proximoIndex];
      state.dinheiro -= item.meta;
      state.comprasFeitas.push(item);
      compras.push(item);
      state.proximoIndex++;
    }
    return compras;
  }

  function afterRideComplete() {
    state.motor = clamp(state.motor - state.decayPerRide, 0, 100);

    if (state.motor <= 0) { state.screen = "lose_motor"; render(); return; }
    afterFinanceCheckpoint();
  }

  function afterFinanceCheckpoint() {
    if (checkPaciencia()) return;
    if (checkFalencia(afterFinanceCheckpoint)) return;

    var compras = tryAutoBuy();

    if (state.comprasFeitas.length >= WISHLIST.length) { state.screen = "win"; render(); return; }

    if (compras.length) {
      state.lastCompras = compras;
      state.screen = "compra";
      render();
      return;
    }

    proceedAfterFinance();
  }

  function renderCompra() {
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">compra feita</div>' +
        '<h2 class="scene-title">🎉 Finalmente deu</h2>' +
        state.lastCompras.map(function (item) {
          return '<p class="body-text"><b>' + escapeHtml(item.texto) + '</b> — ' + escapeHtml(item.sucesso) + '</p>';
        }).join("") +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn primary" id="btn-continue">Seguir o dia</button>' +
      '</div>';
    document.getElementById("btn-continue").addEventListener("click", proceedAfterFinance);
  }

  function proceedAfterFinance() {
    if (state.aceitas > 0 && state.aceitas % MAINT_EVERY === 0 && state.lastMaintAt !== state.aceitas) {
      state.lastMaintAt = state.aceitas;
      state.currentMaintenance = MAINTENANCE[Math.floor(Math.random() * MAINTENANCE.length)];
      state.screen = "maintenance";
      render();
      return;
    }
    goToNextRide();
  }

  function renderMaintenance() {
    var m = state.currentMaintenance;
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">parada obrigatória na oficina</div>' +
        '<h2 class="scene-title">' + m.emoji + ' ' + escapeHtml(m.titulo) + '</h2>' +
        '<p class="body-text">' + escapeHtml(m.texto) + '</p>' +
      '</div>' +
      '<div class="actions">' +
        m.escolhas.map(function (c, i) {
          return '<button class="btn" data-i="' + i + '">' + escapeHtml(c.rotulo) + '<span class="sub">' + escapeHtml(c.sub) + '</span></button>';
        }).join("") +
      '</div>';

    Array.prototype.forEach.call(device.querySelectorAll("[data-i]"), function (btn) {
      btn.addEventListener("click", function () {
        resolveMaintenance(m.escolhas[parseInt(btn.getAttribute("data-i"), 10)]);
      });
    });
  }

  function resolveMaintenance(choice) {
    state.dinheiro -= choice.custo;
    state.motor = clamp(state.motor + choice.motor, 0, 100);
    if (choice.decayNovo !== null && choice.decayNovo !== undefined) state.decayPerRide = choice.decayNovo;
    if (choice.risco !== undefined) state.riscoBatidaMod = clamp(state.riscoBatidaMod + choice.risco, -10, 30);
    state.fabiTrigger = state.fabiTrigger || !!choice.ruim;

    state.lastMaintResolution = choice.resultado;
    state.lastMaintChips = [
      { label: choice.custo > 0 ? "-" + formatMoney(choice.custo) : "sem custo", cls: choice.custo > 0 ? "bad" : "good" },
      { label: formatSigned(choice.motor, "% motor"), cls: choice.motor >= 0 ? "good" : "bad" }
    ];
    state.screen = "maintenance-result";
    render();
  }

  function renderMaintenanceResult() {
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">resolvido</div>' +
        '<p class="body-text">' + escapeHtml(state.lastMaintResolution) + '</p>' +
        '<div class="delta-log">' +
          state.lastMaintChips.map(function (c) { return '<span class="chip ' + c.cls + '">' + escapeHtml(c.label) + '</span>'; }).join("") +
        '</div>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn primary" id="btn-continue">Voltar pro trânsito</button>' +
      '</div>';
    document.getElementById("btn-continue").addEventListener("click", function () {
      if (checkPaciencia()) return;
      if (checkFalencia(function () { maybeShowFabi(goToNextRide); })) return;
      maybeShowFabi(goToNextRide);
    });
  }

  // ---------------------------------------------------------------
  // interrupções da família
  // ---------------------------------------------------------------

  function renderFamily() {
    var e = state.currentFamily;
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">interrupção familiar</div>' +
        '<h2 class="scene-title">' + e.emoji + ' ' + escapeHtml(e.titulo) + '</h2>' +
        '<p class="body-text">' + escapeHtml(e.texto) + '</p>' +
      '</div>' +
      '<div class="actions">' +
        e.escolhas.map(function (c, i) {
          return '<button class="btn" data-i="' + i + '">' + escapeHtml(c.rotulo) + '<span class="sub">' + escapeHtml(c.sub) + '</span></button>';
        }).join("") +
      '</div>';

    Array.prototype.forEach.call(device.querySelectorAll("[data-i]"), function (btn) {
      btn.addEventListener("click", function () {
        resolveFamilyEvent(e.escolhas[parseInt(btn.getAttribute("data-i"), 10)]);
      });
    });
  }

  function resolveFamilyEvent(choice) {
    var sorte = false;
    var bonus = 0;
    if (choice.sorteChance) {
      sorte = Math.random() * 100 < choice.sorteChance;
      if (sorte) bonus = choice.sorteBonus;
    }
    var totalDinheiro = choice.dinheiro + bonus;
    state.dinheiro += totalDinheiro;
    state.paciencia = clamp(state.paciencia + choice.paciencia, 0, 100);
    state.minutos += choice.minutos || 0;
    state.fabiTrigger = state.fabiTrigger || (!!choice.ruim && !sorte);

    state.lastFamilyResolution = choice.resultado + (sorte && choice.resultadoSorte ? " " + choice.resultadoSorte : "");
    var chips = [
      { label: (totalDinheiro >= 0 ? "+" : "") + formatMoney(totalDinheiro), cls: totalDinheiro >= 0 ? "good" : "bad" },
      { label: formatSigned(choice.paciencia, "") + " paciência", cls: choice.paciencia >= 0 ? "good" : "bad" }
    ];
    if (choice.minutos) chips.push({ label: choice.minutos + " min perdidos", cls: "bad" });
    if (sorte) chips.push({ label: "sorte grande", cls: "good" });
    state.lastFamilyChips = chips;
    state.screen = "family-result";
    render();
  }

  function renderFamilyResult() {
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">resolvido</div>' +
        '<p class="body-text">' + escapeHtml(state.lastFamilyResolution) + '</p>' +
        '<div class="delta-log">' +
          state.lastFamilyChips.map(function (c) { return '<span class="chip ' + c.cls + '">' + escapeHtml(c.label) + '</span>'; }).join("") +
        '</div>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn primary" id="btn-continue">Voltar pro trânsito</button>' +
      '</div>';
    document.getElementById("btn-continue").addEventListener("click", function () {
      if (checkPaciencia()) return;
      if (checkFalencia(function () { maybeShowFabi(goToNextRide); })) return;
      maybeShowFabi(goToNextRide);
    });
  }

  function maybeShowFabi(nextFn) {
    if (state.fabiTrigger && Math.random() < 0.5) {
      state.fabiTrigger = false;
      state.lastFabiLine = FABI_LINES[Math.floor(Math.random() * FABI_LINES.length)];
      state.paciencia = clamp(state.paciencia - 3, 0, 100);
      state._fabiNext = nextFn;
      state.screen = "fabi";
      render();
    } else {
      state.fabiTrigger = false;
      nextFn();
    }
  }

  function renderFabi() {
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">primo Fabi Jujuba apareceu</div>' +
        '<h2 class="scene-title">😂 Ele viu tudo</h2>' +
        '<p class="quote">' + escapeHtml(state.lastFabiLine) + '</p>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn primary" id="btn-continue">Ignorar e seguir</button>' +
      '</div>';
    document.getElementById("btn-continue").addEventListener("click", function () { state._fabiNext(); });
  }

  // ---------------------------------------------------------------
  // comida do dia
  // ---------------------------------------------------------------

  function renderComida() {
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">bateu a fome</div>' +
        '<h2 class="scene-title">🍽️ Hora de comer alguma coisa</h2>' +
        '<p class="body-text">Comer mal é barato, mas enche pouco — e passar mal tira o resto do dia. Comer bem custa mais e ainda pede uma paradinha no banheiro, mas a fome some.</p>' +
      '</div>' +
      '<div class="actions">' +
        FOOD_OPTIONS.map(function (f, i) {
          var riscoTxt = f.risco >= 18 ? "risco alto de passar mal" : f.risco >= 8 ? "algum risco de passar mal" : f.risco > 0 ? "risco baixo" : "sem risco, mas com paradinha";
          return '<button class="btn" data-food="' + i + '">' + escapeHtml(f.nome) + ' · ' + formatMoney(f.custo) + '<span class="sub">' + riscoTxt + '</span></button>';
        }).join("") +
      '</div>';

    Array.prototype.forEach.call(device.querySelectorAll("[data-food]"), function (btn) {
      btn.addEventListener("click", function () {
        resolveComida(FOOD_OPTIONS[parseInt(btn.getAttribute("data-food"), 10)]);
      });
    });
  }

  function resolveComida(opt) {
    state.dinheiro -= opt.custo;
    var passouMal = Math.random() * 100 < opt.risco;
    if (passouMal) {
      state.cansaco = clamp(state.cansaco + 15, 0, 100);
      state.lastComidaResultado = escapeHtml(opt.nome) + " cai mal. Dor de barriga daquelas — o resto do dia vira sofá forçado.";
      state.lastComidaFimDeDia = true;
    } else {
      state.minutos += opt.paradinha;
      state.lastComidaResultado = opt.paradinha > 0
        ? "Comeu bem. A fome some pro resto do dia, mas a paradinha no banheiro custou uns minutos."
        : "Comeu correndo. Vai aguentar mais um tempinho, pelo menos.";
      state.lastComidaFimDeDia = false;
    }
    state.lastComidaChips = [
      { label: "-" + formatMoney(opt.custo), cls: "bad" }
    ];
    if (!passouMal && opt.paradinha) state.lastComidaChips.push({ label: opt.paradinha + " min de paradinha", cls: "bad" });
    if (passouMal) state.lastComidaChips.push({ label: "passou mal", cls: "bad" });
    state.screen = "comida-result";
    render();
  }

  function renderComidaResult() {
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">' + (state.lastComidaFimDeDia ? "passou mal" : "almoço resolvido") + '</div>' +
        '<p class="body-text">' + state.lastComidaResultado + '</p>' +
        '<div class="delta-log">' +
          state.lastComidaChips.map(function (c) { return '<span class="chip ' + c.cls + '">' + escapeHtml(c.label) + '</span>'; }).join("") +
        '</div>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn primary" id="btn-continue">' + (state.lastComidaFimDeDia ? "Ver o fim do dia" : "Seguir o dia") + '</button>' +
      '</div>';
    document.getElementById("btn-continue").addEventListener("click", function () {
      var proximo = state.lastComidaFimDeDia ? function () { endWorkDay("doenca"); } : goToNextRide;
      if (checkFalencia(proximo)) return;
      proximo();
    });
  }

  // ---------------------------------------------------------------
  // gasto aleatório
  // ---------------------------------------------------------------

  function renderGasto() {
    var g = state.currentGasto;
    device.innerHTML =
      renderStatbar() +
      '<div class="scene fade-in">' +
        '<div class="eyebrow">gasto inesperado</div>' +
        '<h2 class="scene-title">💳 Caiu uma cobrança</h2>' +
        '<p class="body-text">' + escapeHtml(g.texto) + '</p>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn primary" id="btn-continue">Pagar e seguir<span class="sub">-' + formatMoney(g.valor) + '</span></button>' +
      '</div>';
    document.getElementById("btn-continue").addEventListener("click", function () {
      state.dinheiro -= g.valor;
      if (checkFalencia(goToNextRide)) return;
      goToNextRide();
    });
  }

  // ---------------------------------------------------------------
  // desfechos
  // ---------------------------------------------------------------

  function carLabel(n) {
    if (n <= 1) return "Ainda só marrom (por enquanto)";
    if (n === 2) return "2 cores — já vira clássico";
    return "3 cores — lenda da Baixada";
  }

  function statsGridHtml() {
    return (
      '<div class="summary-grid">' +
        '<div class="summary-cell"><div class="k">caixa final</div><div class="v" style="color:' + (state.dinheiro >= 0 ? "var(--gold)" : "var(--bad)") + '">' + formatMoney(state.dinheiro) + '</div></div>' +
        '<div class="summary-cell"><div class="k">nota</div><div class="v">' + renderStars(state.nota) + ' ' + state.nota.toFixed(1) + '</div></div>' +
        '<div class="summary-cell"><div class="k">corridas aceitas</div><div class="v">' + state.aceitas + '</div></div>' +
        '<div class="summary-cell"><div class="k">corridas recusadas</div><div class="v">' + state.recusadas + '</div></div>' +
        '<div class="summary-cell"><div class="k">dia do desfecho</div><div class="v">' + state.dia + ' / ' + TOTAL_DIAS + '</div></div>' +
        '<div class="summary-cell"><div class="k">lista de compras</div><div class="v">' + state.comprasFeitas.length + ' / ' + WISHLIST.length + '</div></div>' +
        '<div class="summary-cell wide"><div class="k">pintura do Versa</div><div class="v">' + carLabel(state.corPatches) + '</div></div>' +
      '</div>'
    );
  }

  function bindAgain() {
    document.getElementById("btn-again").addEventListener("click", function () {
      var jogador = state.jogador;
      state = freshState(jogador);
      render();
    });
  }

  function renderWin() {
    var ranking = addRankingEntry(state.jogador, state.dia);
    device.innerHTML =
      '<div class="scene fade-in">' +
        '<div class="eyebrow">desfecho de ' + escapeHtml(state.jogador) + '</div>' +
        '<span class="badge-outcome win">vitória</span>' +
        '<h1 class="title">Comprou tudo. Sério.</h1>' +
        '<p class="body-text">Bolo, lanterna de seta, PC, skin do CS, Wi-Fi, fantasia e até a pensão — tudo pago no lucro das corridas, no dia ' + state.dia + ' dos 30. Feriado merecido a partir de agora.</p>' +
        renderDayTrack() +
        statsGridHtml() +
        '<div class="eyebrow">ranking · melhores tempos</div>' +
        renderRankingHtml(ranking.list, ranking.entry) +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn primary" id="btn-again">Rodar outro desafio</button>' +
      '</div>';
    bindAgain();
  }

  function renderLose(tipo) {
    var titulo, texto;
    if (tipo === "motor") {
      titulo = "O motor fundiu.";
      texto = "Óleo barato demais, revisão adiada demais. O motor bateu, fumaçou e morreu no meio da Baixada. Vai ter que empurrar o Versa até a oficina.";
    } else if (tipo === "falencia") {
      titulo = "Faliu de vez.";
      texto = "Mais gasto que corrida boa. O caixa foi pro vermelho e não voltou. Hoje nem pra gasolina de amanhã sobrou.";
    } else if (tipo === "cp") {
      titulo = "CP apareceu pessoalmente.";
      texto = "A dívida cresceu rápido demais. CP apareceu numa quarta à noite, ainda de farda do quartel, e deixou bem claro que da próxima vez não seria só conversa. O Versa fica de garantia — e Hernalton reconsidera as prioridades da vida.";
    } else {
      var faltam = WISHLIST.length - state.comprasFeitas.length;
      titulo = "Os 30 dias acabaram.";
      texto = "A lista não fechou a tempo — faltaram " + faltam + " ite" + (faltam === 1 ? "m" : "ns") + ". O desafio era esse mês, e o mês virou.";
    }
    var quote = "";
    if (tipo === "prazo") {
      var band = state.paciencia >= 70 ? "zen" : state.paciencia >= 40 ? "normal" : state.paciencia >= 10 ? "ruim" : "surto";
      var quotes = ENDING_QUOTES_PATIENCE[band];
      quote = '<p class="quote">' + quotes[Math.floor(Math.random() * quotes.length)] + '</p>';
    }
    device.innerHTML =
      '<div class="scene fade-in">' +
        '<div class="eyebrow">desfecho de ' + escapeHtml(state.jogador) + '</div>' +
        '<span class="badge-outcome lose">game over</span>' +
        '<h1 class="title">' + titulo + '</h1>' +
        '<p class="body-text">' + texto + '</p>' +
        renderDayTrack() +
        statsGridHtml() +
        quote +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn primary" id="btn-again">Tentar o próximo mês?</button>' +
      '</div>';
    bindAgain();
  }

  // ---------------------------------------------------------------
  // boot
  // ---------------------------------------------------------------

  state = freshState("");
  render();
})();
</script>
